x-general: &general
  init: true
  logging:
    options:
      max-size: 256m
      max-file: 4
  restart: unless-stopped
  networks:
    - default

services:
  cadvisor:
    <<: *general
    image: ghcr.io/google/cadvisor:0.54.1
    hostname: cadvisor
    container_name: cadvisor
    volumes:
      - /:/rootfs/:ro
      - /var/run:/var/run/:ro
      - /sys:/sys/:ro
      - /var/lib/docker/:/var/lib/docker/:ro
      - /dev/disk/:/dev/disk/:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    expose:
      - "8080"
    privileged: true

  node-exporter:
    <<: *general
    image: quay.io/prometheus/node-exporter:latest
    hostname: node-exporter
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    expose:
      - "9100"

  dcgm-exporter:
    image: nvidia/dcgm-exporter:4.4.2-4.7.0-distroless
    hostname: dcgm-exporter
    container_name: dcgm-exporter
    cap_add:
      - SYS_ADMIN
    expose:
      - "9400"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    container_name: grafana
    expose:
      - 3000
    ports:
      - 3000:3000
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:rw
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/admin_password
    secrets:
      - admin_password
    networks:
      - default
      - grafana.net

secrets:
  admin_password:
    file: secrets/admin_password

networks:
  default:
  grafana.net:
    name: grafana.net
    driver: bridge

volumes:
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./grafana-data
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: prometheus-data
